<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amenify Support Bot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; max-width: 100%; height: 600px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #0056b3; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 20px; max-width: 80%; word-wrap: break-word; line-height: 1.4; }
        .message.bot { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 5px; }
        .message.user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .chat-input { display: flex; padding: 15px; border-top: 1px solid #ddd; background: #fff; }
        .chat-input input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 1rem; }
        .chat-input button { background: #007bff; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        .chat-input button:hover { background: #0056b3; }
        .typing-indicator { display: none; align-self: flex-start; padding: 10px 15px; background: #e9ecef; border-radius: 20px; color: #666; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Amenify Support</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">Hello! I'm the Amenify Support Bot. How can I help you today?</div>
        </div>
        <div class="typing-indicator" id="typing-indicator">Typing...</div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let chatHistory = [];

        function appendMessage(sender, text) {
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            appendMessage('user', message);
            inputField.value = '';

            const typingIndicator = document.getElementById('typing-indicator');
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, history: chatHistory })
                });

                if (!response.ok) {
                    throw new Error('Server error');
                }

                const data = await response.json();
                typingIndicator.style.display = 'none';
                appendMessage('bot', data.response);

                chatHistory.push({ role: 'user', content: message });
                chatHistory.push({ role: 'assistant', content: data.response });
                // We only keep the last 5 exchanges (10 messages) to save tokens
                if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
            } catch (error) {
                console.error(error);
                typingIndicator.style.display = 'none';
                appendMessage('bot', 'Sorry, I am having trouble connecting to the server. Is the API currently running?');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
